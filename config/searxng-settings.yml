# SearXNG Configuration for Helpdesk Agent
# Place at /etc/searxng/settings.yml inside container

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "${SEARX_SECRET_KEY:-change_this_secret_key}"
  base_url: "${SEARXNG_BASE_URL:-http://localhost:8888/}"
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json
    - csv
    - rss

ui:
  static_use_hash: false
  default_locale: "en"
  theme: simple
  infinite_scroll: false
  search_on_category_select: true
  hotkeys: vim

outgoing:
  request_timeout: 5.0
  max_request_timeout: 10.0
  user_agent_suffix: "J1-Helpdesk-Agent"
  enable_http2: true
  pool_connections: 100
  pool_maxsize: 20

# Limit results for API consumers + disable unnecessary features
search:
  max_result_count: 20

# Disable unnecessary features for API-only use
disabled_plugins:
  - "Self Information"
  - "Tracker URL remover"
  - "Vim-like hotkeys"
  - "Hostnames plugin"
  - "Open Access DOI rewrite"
  - "Tor check plugin"

enabled_plugins:
  - "Basic Calculator"
  - "Hash plugin"
  - "Self Information"
  - "URL resolver"
  - "Unit converter"

# Rate limiting for API consumers
limiter:
  enabled: true
  # 30 requests per minute per IP
  botsearch:
    max_request_cnt_per_minute: 30

# Logging
logging:
  level: WARNING
